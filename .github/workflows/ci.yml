name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}-${{ github.event }}
  cancel-in-progress: true

jobs:
  # ============ 1. 类型检查(最快,先跑) ============
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 干净 clone 后 node_modules/.prisma/client 是空的
      # 必须在 typecheck 前先 generate(API 代码依赖 Prisma.LeadWhereInput 等类型)
      - name: Generate Prisma Client
        run: cd apps/api && pnpm prisma:generate
      - run: pnpm typecheck

  # ============ 2. 单元测试(后端 + 前端) ============
  test-unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @lm-unity/shared 通过 pnpm workspace 链接到 packages/shared
      # 但 main 字段是 ./dist/index.js,必须 build 后才能被 require
      # typecheck 跑 turbo 会顺带 build,但这里单独跑 pnpm test 不经过 turbo
      - name: Build shared package
        run: pnpm --filter @lm-unity/shared build
      - name: Generate Prisma Client
        run: cd apps/api && pnpm prisma:generate
      - name: api unit tests
        run: pnpm --filter @lm-unity/api test
      - name: web unit tests
        run: pnpm --filter @lm-unity/web-admin test

  # ============ 3. 后端 jest e2e(需 Postgres) ============
  # GitHub service container:起隔离的 postgres-test,跑完即销毁
  test-e2e-api:
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lmsuo
          POSTGRES_PASSWORD: lmsuo_test_pw
          POSTGRES_DB: lmsuo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lmsuo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://lmsuo:lmsuo_test_pw@localhost:5432/lmsuo_test?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters-long
      APP_PORT: "3080"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @lm-unity/shared build
      - name: Generate Prisma Client
        run: cd apps/api && pnpm prisma:generate
      - name: Run migrations
        run: pnpm --filter @lm-unity/api exec prisma migrate deploy
      - name: Seed e2e tenant
        run: pnpm --filter @lm-unity/api exec tsx prisma/e2e-seed.ts
      - name: Run jest e2e
        run: pnpm --filter @lm-unity/api test:e2e

  # ============ 4. Playwright e2e(端到端,只在 main 跑,失败不阻塞 PR) ============
  # 起 api + web + chromium,跑真实浏览器测试
  # 慢(8-12 min),只在 push main 跑(PR 上太重)
  e2e-playwright:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    continue-on-error: true  # 失败不阻塞,留 warning
    services:
      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lmsuo
          POSTGRES_PASSWORD: lmsuo_test_pw
          POSTGRES_DB: lmsuo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lmsuo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://lmsuo:lmsuo_test_pw@localhost:5432/lmsuo_test?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters-long
      APP_PORT: "3080"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @lm-unity/shared build
      - name: Build api (需要 dist/)
        run: cd apps/api && pnpm build
      - name: Generate Prisma Client
        run: cd apps/api && pnpm prisma:generate
      - name: Run migrations
        run: cd apps/api && pnpm exec prisma migrate deploy
      - name: Seed e2e tenant
        run: cd apps/api && pnpm exec tsx prisma/e2e-seed.ts
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run playwright e2e
        run: pnpm e2e
        env:
          # playwright 的 webServer.command 会读这些 env
          CI: "true"
      - name: Upload Playwright Report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Playwright Traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
