# =============================================================================
# LM Unity · Counsel · Local Nginx 配置(子目录路由层)
# =============================================================================
#
# 部署位置: 与 public nginx 同一台机器(本机 nginx,端口 80,无 SSL)
# 作用:     把 /lvsuo/* 拆成 /api → 后端,其余 → Vite dev
# 链路:     Public(:443, SSL) → 本文件(:80) → Vite(:5173) / NestJS(:3000)
#
# 关键差异(对比 public-nginx.conf):
#   - 没有 SSL(SSL 已在 public 终结)
#   - 没有 server_name 限制(match any)
#   - 只关注子目录路由
#   - WebSocket 仍要透传(Vite HMR)
#
# 用法:
#   sudo cp lvsuo-local-nginx.conf /etc/nginx/sites-enabled/lvsuo
#   sudo nginx -t && sudo nginx -s reload
# =============================================================================

# map for WebSocket connection header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;  # 匹配任意 host(由 public nginx 转发而来)

    # ---- 通用设置 ----
    client_max_body_size 50M;
    client_body_timeout  60s;
    send_timeout         60s;
    keepalive_timeout     75s;

    # ---- 访问 / 错误日志 ----
    access_log /var/log/nginx/lvsuo-access.log;
    error_log  /var/log/nginx/lvsuo-error.log warn;

    # ============================================================
    # 0. 301: /lvsuo → /lvsuo/  (保证尾斜杠)
    # ============================================================
    location = /lvsuo {
        return 301 $scheme://$host/lvsuo/;
    }

    # ============================================================
    # 1. API 代理(优先级最高)
    #    /lvsuo/api/* → http://127.0.0.1:3000/api/counsel/v1/*
    # ============================================================
    location ^~ /lvsuo/api/ {
        # proxy_pass 带 URI,nginx 自动把 /lvsuo/api/ 替换为 /api/counsel/v1/
        proxy_pass http://127.0.0.1:3000/api/counsel/v1/;

        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # API 响应不缓存(可能含 L4+ 敏感数据)
        add_header Cache-Control "no-store" always;
    }

    # ============================================================
    # 2. Web UI 代理 → Vite dev (5173)
    #    /lvsuo/* → http://127.0.0.1:5173/lvsuo/*
    # ============================================================
    location ^~ /lvsuo/ {
        proxy_pass http://127.0.0.1:5173/lvsuo/;

        proxy_http_version 1.1;

        # WebSocket 透传(HMR 关键)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # HMR WebSocket 长连接
        proxy_connect_timeout 5s;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }
}
