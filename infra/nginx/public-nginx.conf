# =============================================================================
# LM Unity · Counsel · Public Nginx 配置(SSL 网关层)
# =============================================================================
#
# 部署位置: 47.96.122.117 这台服务器的 *外层* nginx
# 作用:     SSL 终结 + 反向代理到本机 Local Nginx
# 链路:     Internet → Public Nginx(:443) → Local Nginx(:80) → Vite/API
#
# 假设:
#   1. 你的域名 huntercat.cn 解析到 47.96.122.117
#   2. 子域名 wxf-prod.huntercat.cn 也指向 47.96.122.117
#   3. SSL 证书已签发(Let's Encrypt / 其他 CA)
#   4. *本机* 上有另一个 nginx 在 :80 监听(就是 local-nginx)
#   5. local nginx 上配置了 /lvsuo 子目录代理(见 lvsuo.conf)
#
# 用法:
#   sudo cp public-nginx.conf /etc/nginx/sites-enabled/wxf-prod.huntercat.cn
#   sudo nginx -t && sudo nginx -s reload
# =============================================================================

# ---------- 80 端口: 自动 HTTPS 跳转 ----------
server {
    listen 80;
    server_name wxf-prod.huntercat.cn;

    # Let's Encrypt 验证需要 /.well-known/acme-challenge 走 HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- 443 端口: SSL + 反向代理到 Local Nginx ----------
# 定义 $connection_upgrade 映射(WebSocket 状态)
#   Upgrade 头为空 → Connection: close
#   Upgrade 头存在 → Connection: upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name wxf-prod.huntercat.cn;

    # ---- SSL 证书(请按实际路径修改) ----
    ssl_certificate     /etc/nginx/ssl/wxf-prod.huntercat.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/wxf-prod.huntercat.cn.key;

    # ---- SSL 优化 ----
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     on;

    # ---- 通用设置 ----
    client_max_body_size   50M;
    client_body_timeout    60s;
    send_timeout           60s;
    keepalive_timeout       75s;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # ---- 访问 / 错误日志(可选) ----
    access_log /var/log/nginx/wxf-prod-access.log;
    error_log  /var/log/nginx/wxf-prod-error.log warn;

    # ============================================================
    # 核心: 反向代理到 Local Nginx
    # ============================================================
    location / {
        # 如果 local nginx 在同台机器
        proxy_pass http://127.0.0.1:80;

        # 如果 local nginx 在不同机器,改成对应 IP
        # proxy_pass http://192.168.1.100:80;
        # proxy_pass http://lvsuo-backend.internal:80;

        proxy_http_version 1.1;

        # 透传原始 Host(让 local nginx 看到真实域名)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket 透传(Vite HMR 关键!)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 长超时(给 HMR WebSocket 续命)
        proxy_connect_timeout 5s;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;

        # 隐藏 upstream 信息
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
