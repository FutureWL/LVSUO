# =============================================================================
# LM Unity · Counsel · Nginx 子目录反向代理配置
# =============================================================================
#
# 目标:
#   https://wxf-prod.huntercat.cn/lvsuo/  →  http://127.0.0.1:5173/lvsuo/   (Vite dev)
#   https://wxf-prod.huntercat.cn/lvsuo/api/*  →  http://127.0.0.1:3001/api/counsel/v1/*  (NestJS)
#
# 假设:
#   1. 已有一个监听 443 的 server { server_name wxf-prod.huntercat.cn; ... }
#   2. SSL 证书已配置
#   3. Vite dev 跑在 5173 端口
#   4. NestJS API 跑在 3001 端口
#
# 用法(三种任选):
#   ① 整段 include 到现有的 server { ... } 内部
#   ② 放到 /etc/nginx/conf.d/lvsuo.conf
#   ③ 放到 /etc/nginx/sites-enabled/lvsuo.conf (含独立的 server 块)
#
# 验证:
#   sudo nginx -t
#   sudo nginx -s reload
# =============================================================================

# -----------------------------------------------------------------------------
# 方案 A: 整段 include 到现有 server { ... } 中
# -----------------------------------------------------------------------------
# 将下面整块代码粘到现有 server 块的最后一个 location 之前

    # ===== 0. 301 重定向: /lvsuo → /lvsuo/ =====
    location = /lvsuo {
        return 301 $scheme://$host/lvsuo/;
    }

    # ===== 1. API 代理(优先级最高) =====
    # /lvsuo/api/* → http://127.0.0.1:3001/api/counsel/v1/*
    # 绕过 Vite,直接打后端,避免 Vite 代理的二次跳转与日志污染
    location ^~ /lvsuo/api/ {
        # /lvsuo/api/auth/login → /api/counsel/v1/auth/login
        rewrite ^/lvsuo/api/(.*)$ /api/counsel/v1/$1 break;

        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # API 通常较快,60s 足够
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # API 响应不缓存(可能含 L4+ 敏感数据)
        add_header Cache-Control "no-store" always;
    }

    # ===== 2. Web UI 代理(开发模式 → Vite 5173) =====
    # /lvsuo/* → http://127.0.0.1:5173/lvsuo/*
    # Vite 已配置 base: '/lvsuo/'(见 apps/web-admin/vite.config.ts)
    location ^~ /lvsuo/ {
        # 转发时保留 /lvsuo/ 前缀(因为 vite 的 base 就是 /lvsuo/)
        proxy_pass http://127.0.0.1:5173/lvsuo/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        # HMR WebSocket 长连接,延长至 24h
        proxy_connect_timeout 5s;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }


# =============================================================================
# 方案 B: 独立 server 块(若 wxf-prod.huntercat.cn 已有别的 server,可独立监听)
# =============================================================================
# server {
#     listen 8443 ssl;        # 或 http;若无 443 占用,也可 listen 80
#     server_name wxf-prod.huntercat.cn;
#
#     # 假设 SSL 已在外层统一处理,或在此处补 ssl_certificate / ssl_certificate_key
#     # ssl_certificate     /etc/nginx/ssl/wxf-prod.huntercat.cn.crt;
#     # ssl_certificate_key /etc/nginx/ssl/wxf-prod.huntercat.cn.key;
#
#     include /etc/nginx/conf.d/lvsuo.conf;
# }
# =============================================================================
