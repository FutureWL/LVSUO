# =============================================================================
# LM Unity · Counsel · Nginx 生产模式配置(直接 serve dist,不走 Vite)
# =============================================================================
#
# 适用场景: 已经 `pnpm build` 完成,需要 nginx 直接 serve 静态资源
#
# 目标:
#   https://wxf-prod.huntercat.cn/lvsuo/  →  静态文件 + /api proxy
#   https://wxf-prod.huntercat.cn/lvsuo/api/*  →  http://127.0.0.1:3001/api/counsel/v1/*
#
# 与 lvsuo.conf (开发模式) 的区别:
#   - 不再 proxy 到 Vite
#   - 直接用 alias 指向 dist 目录
#   - 性能更好,不需要 Node.js 进程
#   - 失去了 HMR(改代码需重新 build)
# =============================================================================

# 应用根目录(改成你的实际部署路径)
set $lvsuo_root /root/DataDisk/workspace/LVSUO/apps/web-admin/dist;

# ===== 0. 301 重定向 =====
location = /lvsuo {
    return 301 $scheme://$host/lvsuo/;
}

# ===== 1. API 代理(同开发模式) =====
location ^~ /lvsuo/api/ {
    rewrite ^/lvsuo/api/(.*)$ /api/counsel/v1/$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    add_header Cache-Control "no-store" always;
}

# ===== 2. 静态资源(长缓存) =====
location ^~ /lvsuo/assets/ {
    alias $lvsuo_root/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

# ===== 3. SPA fallback(其他路径走 index.html) =====
location ^~ /lvsuo/ {
    alias $lvsuo_root/;
    try_files $uri $uri/ /index.html;

    # index.html 不缓存(便于发版)
    location = /lvsuo/index.html {
        alias $lvsuo_root/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
